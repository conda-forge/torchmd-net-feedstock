{% set name = "torchmd-net" %}
{% set version = "3.0.3" %}
{% set sha256 = "927b43dab5b7d8390f33ded2c1aaf04624b931018f5162fccce8a3527c3cfc89" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/torchmd_net-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  noarch: python
  entry_points:
    - torchmd-train = torchmdnet.scripts.train:main
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=78
    - setuptools-scm >=8
    - pip
  run:
    - python >={{ python_min }}
    - h5py
    - pytorch
    - pytorch_geometric
    - lightning
    - tqdm
    - numpy
    - ase
    - warp-lang

test:
  imports:
    - torchmdnet
  commands:
    - torchmd-train --help
  requires:
    - python {{ python_min }}

about:
  home: https://github.com/torchmd/torchmd-net
  summary: TorchMD-NET provides state-of-the-art neural networks potentials for biomolecular systems
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - stefdoerr
